

services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Pass123!Strong
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - "sqlserver_data:/var/opt/mssql"

  api:
    build:
      context: .
      dockerfile: Refacciones.API/Dockerfile
    ports:
      - "5012:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Server=db;Database=RefaccionesDb;User Id=sa;Password=Pass123!Strong;TrustServerCertificate=True
    depends_on:
      - db

  frontend:
    build:
      context: ./refacciones-frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api
  
volumes:
 sqlserver_data:  